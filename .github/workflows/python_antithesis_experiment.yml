name: Antithesis - Python Echo Server

env:
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: us-central1-docker.pkg.dev/molten-verve-216720/${{ vars.ANTITHESIS_REPOSITORY_NAME }}-repository
  IMAGES_PREFIX: python-echo-server
  IMAGES_TAG: ${{ github.run_number }}_${{github.sha}}

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration (minutes)"
        required: true
        type: string
        default: "30"
      description:
        description: "Experiment description (defaults to commit SHA, avoid quotes, please!)"
        required: false
        type: string
        default: ""
      email:
        description: "Email notification recipient"
        required: false
        type: string
        default: "your.name@example.com"

jobs:
  build_publish_launch:
    name: "Publish images and launch experiment"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Antithesis Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.ANTITHESIS_REGISTRY_CREDS }}

      - name: Override image name and tag in docker-compose.yaml via environment
        run: |
          echo "IMAGES_PREFIX=${IMAGES_PREFIX}" >> ./python/antithesis/config/.env
          echo "IMAGES_TAG=${IMAGES_TAG}" >> ./python/antithesis/config/.env
          echo "Docker compose environment:"
          cat ./python/antithesis/config/.env

      - name: Build and push config image
        uses: docker/build-push-action@v7
        with:
          context: ./python/antithesis/config
          file: ./python/antithesis/Dockerfile
          tags: ${{ env.REPOSITORY }}/${{ env.IMAGES_PREFIX }}-config:${{ env.IMAGES_TAG }}
          push: true

      - name: Build and push SUT image
        uses: docker/build-push-action@v7
        with:
          context: ./python
          file: ./python/Dockerfile
          tags: ${{ env.REPOSITORY }}/${{ env.IMAGES_PREFIX }}-sut:${{ env.IMAGES_TAG }}
          push: true

      # antithesis.source is set to include the GitHub user that initiated the action. This will cause Antithesis Findings to
      # calculate separately for each user that attempts the tutorial, which is desired.
      - uses: antithesishq/antithesis-trigger-action@v0.8
        with:
          notebook_name: basic_test
          tenant: ${{ vars.ANTITHESIS_TENANT_NAME }}
          username: ${{ secrets.ANTITHESIS_USERNAME }}
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.ANTITHESIS_GH_PAT }}
          config_image: ${{ env.REPOSITORY }}/${{ env.IMAGES_PREFIX }}-config:${{ env.IMAGES_TAG }}
          description: ${{ github.event.inputs.description }}
          email_recipients: ${{ github.event.inputs.email }}
          additional_parameters: |-
            antithesis.duration=${{ github.event.inputs.duration }}
            antithesis.source=tutorial-1-${{ github.actor }}